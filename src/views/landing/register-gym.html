<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register Your Gym</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/landing/css/styles.css" />
  <script src="https://kit.fontawesome.com/e6d1f98a15.js" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="./assets/landing/css/bootsnav.css">
  <link rel="stylesheet" href="./assets/landing/css/bootstrap.min.css">
  <link rel="stylesheet" href="./assets/landing/css/owl.carousel.min.css">
  <link rel="stylesheet" href="./assets/landing/css/owl.theme.default.min.css">
  <link rel="stylesheet" href="./assets/landing/css/font-awesome.css">
  <link rel="stylesheet" href="./assets/landing/css/font-awesome.min.css">
  <link rel="stylesheet" href="./assets/landing/css/sm-clean.css">
  <link rel="stylesheet" href="./assets/landing/css/sm-core-css.css">
  <link rel="stylesheet" href="./assets/landing/css/style.css">
  <link rel="stylesheet" href="./assets/landing/css/responsive.css">

  <script src="https://kit.fontawesome.com/e6d1f98a15.js" crossorigin="anonymous"></script>
  <style>
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000bc;
      backdrop-filter: blur(20px);
      /* optional glass effect */

      z-index: 9999;

       .popup {
            position: fixed;
            top: 8vh;
            right: 20px;
            background: #28a746bf;
            color: white;
            padding: 15px;
            border-radius: 5px;
            z-index: 9000;
          }
          .hidden {
            display: none;
          }
    }
  </style>

</head>

<body class="former d-flex justify-content-center">

  <div id="loader">
    <div class="dumbbell"></div>
  </div>

  <!-- header -->

  <!-- end header -->
        <div id="popup" class="popup hidden"></div>

  <main class="container py-5 d-flex justify-content-center mb-5">
    <div class="auth-wrap mx-auto">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center mb-3">
          <h1 class="fw-bold text-white"><a href="/">FITNEXIS</a></h1>
        </div>
        <!-- <p class="muted mb-0">Manage your account with ease</p> -->
      </div>
  
      <div class="card glass-card shadow-lg rounded-4 mb-5">
        <div class="card-body p-3 p-md-5">
          <form id="registerForm">
            <div class="row justify-content-center g-4">
              <div class="col-md-6 col-sm-12 ">
                <h2 class="fw-semibold">Gym Details</h2>
                <div class="form-floating mb-3">
                  <input type="text" name="name" class="form-control" placeholder="Gym Name" required />
                  <label>Gym Name</label>
                </div>
  
                <div class="form-floating mb-3">
                  <input type="text" name="slug" class="form-control" placeholder="Gym Slug (e.g. goldsgym)" required />
                  <label>Gym Slug (e.g. goldsgym)</label>
                </div>
  
                <div class="form-floating mb-3">
                  <input type="email" name="gymMail" class="form-control" placeholder="Email" required />
                  <label>Gym Email</label>
                </div>
  
                <div class="form-floating mb-3">
                  <input type="address" name="address" class="form-control" placeholder="Phone" />
                  <label>Gym Address</label>
                </div>
              </div>
  
              <div class="col-md-6 col-sm-12 ">
                <h2 class="fw-semibold">Admin Details</h2>
  
                <div class="form-floating mb-3">
                  <input type="text" name="firstname" class="form-control" placeholder="First Name" required />
                  <label>First Name</label>
                </div>
  
                <div class="form-floating mb-3">
                  <input type="text" name="lastname" class="form-control" placeholder="Last Name" required />
                  <label>Last Name</label>
                </div>
  
                <div class="form-floating mb-3">
                  <input type="text" name="phone" class="form-control" placeholder="Phone" />
                  <label>Phone</label>
                </div>
  
                <div class="form-floating mb-3">
                  <input type="email" name="email" class="form-control" placeholder="Email" required />
                  <label>Email</label>
                </div>
  
                <div class="form-floating mb-3">
                  <input type="password" name="password" class="form-control" placeholder="Password" required />
                  <label>Password</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg rounded-3">Register Gym</button>
  
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>



  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.addEventListener("load", () => {
      document.getElementById("loader").style.display = "none";
    });
  </script>
  <script>
    const form = document.getElementById("registerForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      const data = Object.fromEntries(formData.entries());

      const res = await fetch("/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (result.success) {
        window.location.href = result.redirect;
      } else {
        alert(result.message);
      }
    });
  </script>
</body>

</html>
